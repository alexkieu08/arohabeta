<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Study Buddy Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container hub-mode">
        <header class="hub-header">
            <div class="header-left">
                <div class="date-badge">
                    <span class="date-icon">...</span>
                    <span id="current-date">3/18 Wednesday</span>
                </div>
                <div class="task-bubble-container">
                    <div class="urgent-bubble">urgent - meeting at 9am</div>
                </div>
            </div>
            <div class="header-right">
                <button class="menu-toggle">☰</button>
                <div class="profile-card">
                    <div class="profile-icon">Profile</div>
                    <div class="profile-grad">Grad</div>
                </div>
            </div>
        </header>

        <main class="hub-main">
            <aside class="left-sidebar">
                <div class="planner-shortcut">
                    <p>click to show the whole planner</p>
                    <div class="planner-preview"></div>
                </div>
            </aside>

            <div class="room-area">
                <div class="avatar-speech-bubble">
                    <span id="speech-text">Today is a new chance! A new you!</span>
                    <div class="bubble-tail"></div>
                </div>

                <div class="character-wrapper" id="hub-avatar">
                    <svg viewBox="0 0 200 250" width="100%" height="100%">
                        <path id="l-leg-path" class="skin-path" d="M 70 200 L 60 240 Q 70 250 80 240 L 90 200" fill="white" stroke="#e5e7eb" stroke-width="2"/>
                        <g id="clothes-l-leg-container"></g>
                        <path id="r-leg-path" class="skin-path" d="M 130 200 L 140 240 Q 130 250 120 240 L 110 200" fill="white" stroke="#e5e7eb" stroke-width="2"/>
                        <g id="clothes-r-leg-container"></g>
                        <g class="character-upper-body" transform-origin="100 200">
                            <path id="l-arm-path" class="skin-path" d="M 75 145 Q 40 155 25 175 Q 40 190 75 165" fill="white" stroke="#e5e7eb" stroke-width="2"/>
                            <g id="clothes-l-arm-container"></g>
                            <g id="r-arm-group" class="waving-arm" transform-origin="125 155">
                                <path id="r-arm-path" class="skin-path" d="M 125 145 Q 160 115 175 125 Q 160 155 125 165" fill="white" stroke="#e5e7eb" stroke-width="2"/>
                                <g id="clothes-r-arm-container"></g>
                            </g>
                            <path id="body-path" class="skin-path" d="M 70 140 Q 100 130 130 140 L 130 200 Q 100 210 70 200 Z" fill="white" stroke="#e5e7eb" stroke-width="2"/>
                            <g id="clothes-body-container"></g>
                            <g id="head-face-group">
                                <ellipse class="skin-path" cx="100" cy="90" rx="60" ry="50" fill="white" stroke="#e5e7eb" stroke-width="2"/>
                                <g id="hair-container"></g>
                                <g id="eyes-container"></g>
                                <g id="blush-container">
                                    <ellipse cx="65" cy="100" rx="8" ry="4" fill="#fca5a5" transform="rotate(-15 65 100)" opacity="0.8"/>
                                    <ellipse cx="135" cy="100" rx="8" ry="4" fill="#fca5a5" transform="rotate(15 135 100)" opacity="0.8"/>
                                </g>
                                <g id="smile-container"></g>
                            </g>
                        </g>
                    </svg>
                </div>
                <div class="shadow"></div>

                <button class="start-session-btn">Start a session</button>
            </div>

            <aside class="right-sidebar">
                <button class="hub-nav-btn">Task categorization</button>
                <div class="hub-panel">
                    <button class="hub-nav-btn secondary">Self-care spaces</button>
                    <div class="panel-content empty"></div>
                </div>
            </aside>
        </main>

        <footer class="hub-footer">
            <div class="toolbar">
                <button class="tool-btn"><span class="icon">Shop</span></button>
                <button class="tool-btn"><span class="icon">Closet</span></button>
                <button class="tool-btn"><span class="icon">Scale</span></button>
            </div>
        </footer>
    </div>

    <script src="character-data.js"></script>
    <script src="character-renderer.js"></script>
    <script src="home.js"></script>
</body>
</html>
