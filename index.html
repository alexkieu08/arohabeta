<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroha Hauora Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="browser-window">
        <div class="browser-header-top">
            <div class="browser-dots-top">
                <div class="dot-small"></div>
                <div class="dot-small"></div>
                <div class="dot-small"></div>
            </div>
        </div>
        <div class="browser-header-bottom">
            <div class="browser-dots-bottom">
                <div class="dot-black"></div>
                <div class="dot-black"></div>
                <div class="dot-black"></div>
                <div class="dot-black"></div>
            </div>
        </div>

        <div class="main-content">
            <!-- Background Blob -->
            <svg class="bg-blob" viewBox="0 0 800 600" preserveAspectRatio="none">
                <path d="M 60,100 C 60,30 200,-20 400,20 C 650,50 800,20 750,150 C 700,300 700,450 500,430 C 300,410 150,300 160,250 C 170,200 60,170 60,100 Z" fill="#b6dcff" />
            </svg>

            <!-- Text Content -->
            <div class="welcome-text">
                <h1>welcome<br>to Aroha Hauora!</h1>
            </div>

            <!-- Login Form -->
            <div class="login-section">
                <div class="login-title">LOG IN</div>
                
                <div class="login-box-container">
                    <!-- Speech bubble tail -->
                    <div class="speech-bubble-tail"></div>

                    <div class="input-container username-input">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" placeholder="Enter your username" class="text-input" />
                    </div>

                    <div class="input-container password-input">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" placeholder="Enter your password" class="text-input" />
                    </div>
                </div>
            </div>
            
            <div class="signup-text">
                Don't have an account? Sign up
            </div>

            <!-- Sun Image for Animation -->
            <img src="sun.png" alt="Sun" class="sun-image" id="sunImage">
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
